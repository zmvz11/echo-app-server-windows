services:
  echo-app-server:
    build: .
    container_name: echo-app-server
    ports:
      - "8080:8080"
    environment:
      ECHO_SERVER_PORT: "8080"
      ECHO_SERVER_HOST: "0.0.0.0"
      ECHO_DATA_DIR: "/app/data"
      ECHO_PUBLIC_BASE_URL: "http://localhost:8080"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    restart: unless-stopped
